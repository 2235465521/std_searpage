server {
    listen 8089;
    server_name 47.106.104.48;

    # Frontend Static Files (Vite/React dist)
    root /home/zkbz01/std_searpage_v2/frontend/dist;
    index index.html;

    # Handle Frontend Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Django Admin & Backend Static Files
    location /static/ {
        alias /home/zkbz01/std_searpage_v2/backend/staticfiles/;
    }

    # 内部下载路由（只有 Django 的 X-Accel-Redirect 可以触发）
    location /protected-files/ {
        internal;
        alias /mnt/std_bk/磁盘阵列/标准文件处理/;
    }

    # Reverse Proxy to Backend API
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8001/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
