<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      (function () {
        var touchOnly = window.matchMedia('(pointer: coarse) and (hover: none)').matches;
        var w = window.innerWidth;
        if (!(touchOnly && w < 768) && (w >= 768 || !touchOnly)) {
          document.documentElement.classList.add('layout-desktop-lock');
        } else {
          document.documentElement.classList.add('layout-mobile');
        }
      })();
    </script>
    <title>智能评审系统 - 标准检索中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
